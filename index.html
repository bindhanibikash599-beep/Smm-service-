<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BikashSMM - Real SMM Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- REAL CASHFREE PRODUCTION SDK -->
    <script src="https://sdk.cashfree.com/js/ui/2.0.0/cashfree.js"></script>
    
    <style>
        body { background: #0f172a; color: white; }
        .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="p-4 flex justify-between items-center glass sticky top-0 z-50">
        <h1 class="text-2xl font-bold italic">Bikash<span class="text-purple-500">SMM</span></h1>
        <div id="authPanel">
            <button onclick="document.getElementById('fundsModal').classList.toggle('hidden')" class="bg-green-600 px-4 py-2 rounded-lg font-bold">Add Funds</button>
        </div>
    </nav>

    <!-- Hero -->
    <section class="py-20 text-center">
        <h2 class="text-4xl md:text-6xl font-black mb-4">India's Cheapest Panel</h2>
        <p class="text-gray-400">Add ₹200 and Boost Your Social Media Instantly!</p>
    </section>

    <!-- Add Funds Modal -->
    <div id="fundsModal" class="fixed inset-0 bg-black/90 hidden flex items-center justify-center p-4 z-[100]">
        <div class="glass p-8 rounded-3xl max-w-sm w-full relative">
            <button onclick="document.getElementById('fundsModal').classList.add('hidden')" class="absolute top-4 right-4 text-gray-500">X</button>
            <h3 class="text-xl font-bold mb-6 text-center">Add Wallet Balance</h3>
            
            <input type="number" id="fundAmount" value="200" min="200" class="w-full bg-white/10 p-4 rounded-xl text-2xl font-bold text-center mb-6 border border-white/20">
            
            <button id="payBtn" onclick="initiateRealPayment()" class="w-full bg-purple-600 py-4 rounded-xl font-bold text-lg hover:bg-purple-700 transition">
                <i class="fas fa-shield-alt mr-2"></i> Pay with Cashfree
            </button>
            <p class="text-[10px] text-center text-gray-500 mt-4">SECURE UPI / CARDS / NETBANKING</p>
        </div>
    </div>

    <script>
        const cashfree = Cashfree({ mode: "production" }); // REAL MODE

        async function initiateRealPayment() {
            const amount = document.getElementById('fundAmount').value;
            const payBtn = document.getElementById('payBtn');

            if (amount < 200) {
                alert('Minimum deposit is ₹200');
                return;
            }

            payBtn.disabled = true;
            payBtn.innerText = "Connecting to Cashfree...";

            try {
                // Call our Backend PHP
                const response = await fetch('create-order.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ amount: amount, customer_id: "BikashUser_1" })
                });

                const data = await response.json();

                if (data.payment_session_id) {
                    // Open Cashfree Checkout
                    cashfree.checkout({
                        paymentSessionId: data.payment_session_id,
                        redirectTarget: "_self" 
                    });
                } else {
                    alert('Error: ' + (data.message || 'Payment Session Failed. Check API Keys.'));
                }
            } catch (err) {
                console.error(err);
                alert('Server Error: create-order.php file nahi mili.');
            } finally {
                payBtn.disabled = false;
                payBtn.innerText = "Pay with Cashfree";
            }
        }
    </script>
</body>
</html>
